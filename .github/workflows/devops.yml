name: DevOps

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write

env:
  GO_VERSION: "1.22.x"

jobs:
  test:
    name: Go Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Verify dependencies
        run: go mod tidy && git diff --exit-code -- go.mod go.sum

      - name: Format check
        run: test -z "$(gofmt -l $(find . -name '*.go' -not -path './.git/*'))"

      - name: Run tests
        run: go test -race -cover ./...

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}/fst-api" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and optionally push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  compose:
    name: Compose Validation
    runs-on: ubuntu-latest
    needs: docker

    env:
      MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
      MYSQL_USER: ${{ secrets.MYSQL_USER }}
      MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Compose config
        run: docker compose config --quiet

      - name: Start stack
        run: docker compose up --build -d

      - name: Wait for API
        run: |
          for attempt in $(seq 1 60); do
            if curl -fsS http://localhost:8080/health; then
              exit 0
            fi
            sleep 2
          done
          docker compose logs
          exit 1

      - name: Smoke test services
        run: |
          curl -fsS http://localhost:8080/health
          curl -fsS http://localhost:8080/metrics | grep fst_http_requests_total
          curl -fsS http://localhost:9090/-/ready
          curl -fsS http://localhost:3000/api/health

      - name: Collect logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Stop stack
        if: always()
        run: docker compose down -v --remove-orphans

  observability:
    name: Observability Assets
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Prometheus config
        run: |
          docker run --rm \
            --entrypoint promtool \
            -v "$PWD:/workspace" \
            prom/prometheus:v2.53.1 \
            check config /workspace/observability/prometheus/prometheus.yml

      - name: Validate Grafana dashboard JSON
        run: jq empty observability/grafana/dashboards/fst-api.json

  security:
    name: Trivy Scan
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build local image for scan
        run: docker build -t fst-api:ci .

      - name: Scan image
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: fst-api:ci
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
